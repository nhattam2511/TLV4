<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TẬP LÀM VĂN LỚP 4</title>
<style>
:root{
  --bg:#f7fbff;--ink:#122033;--muted:#64748b;--line:#dbeafe;--card:#fff;
  --primary:#2563eb;--primary2:#1d4ed8;--green:#16a34a;--amber:#f59e0b;--red:#ef4444;--purple:#7c3aed;
  --shadow:0 18px 45px rgba(15,23,42,.10);
}
*{box-sizing:border-box;min-width:0}
html,body{margin:0;width:100%;overflow-x:hidden}
body{
  min-height:100vh;font-family:"Segoe UI",Arial,sans-serif;color:var(--ink);
  background:
    radial-gradient(circle at 9% 7%,rgba(37,99,235,.14),transparent 27%),
    radial-gradient(circle at 91% 14%,rgba(245,158,11,.15),transparent 24%),
    radial-gradient(circle at 70% 86%,rgba(22,163,74,.10),transparent 28%),
    linear-gradient(135deg,#f8fbff,#eef6ff 54%,#fff7ed);
  padding-bottom:86px;
}
button{font-family:inherit}
.container{width:min(1000px,calc(100% - 28px));margin:auto;padding:24px 0 64px}
.hero{
  border-radius:30px;padding:25px;box-shadow:var(--shadow);color:#fff;overflow:hidden;position:relative;
  background:linear-gradient(135deg,#0f3f9c,#2563eb 55%,#0891b2);
}
.hero::after{content:"";position:absolute;right:-70px;top:-85px;width:250px;height:250px;border-radius:50%;background:rgba(255,255,255,.16)}
.hero h1{margin:0;font-size:clamp(1.65rem,3.4vw,3rem);line-height:1.14;position:relative;z-index:1}
.hero-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px;position:relative;z-index:1}
.hero-chip{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.30);border-radius:999px;padding:8px 11px;font-weight:900;font-size:.9rem}
.text-tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}
.text-tab{border:1px solid rgba(255,255,255,.96);background:rgba(255,255,255,.86);border-radius:22px;padding:14px;display:flex;gap:12px;text-align:left;cursor:pointer;box-shadow:0 9px 22px rgba(15,23,42,.06);transition:.16s}
.text-tab:hover{transform:translateY(-2px);box-shadow:0 14px 26px rgba(15,23,42,.10)}
.text-tab.active{background:#fff;border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.28),0 14px 28px rgba(15,23,42,.08)}
.emoji{width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;flex:0 0 auto;color:#fff}
.earth .emoji{background:linear-gradient(135deg,#10b981,#2563eb)}.bac .emoji{background:linear-gradient(135deg,#ef4444,#f59e0b)}
.tab-title{font-size:1.05rem;font-weight:800}
.tab-sub{margin-top:3px;color:var(--muted);font-weight:600;font-size:.88rem}
.layout{margin-top:24px;}
.panel{background:rgba(255,255,255,.93);border:1px solid rgba(255,255,255,.93);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}
.panel-head{padding:14px 17px;background:linear-gradient(135deg,rgba(37,99,235,.10),rgba(8,145,178,.10));border-bottom:1px solid #e7eef8;font-weight:800;color:#102a5c;display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;}
.panel-body{padding:20px}
.reader-actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.btn{border:0;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer;transition:.16s;line-height:1.2}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,23,42,.12)}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.btn-light{background:#fff;color:#102a5c;border:1px solid #dbe7f5}
.btn-active{background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;box-shadow:0 0 0 2px rgba(147,197,253,.28)}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.legend span{border-radius:999px;padding:6px 9px;background:#f8fafc;border:1px solid #e2e8f0;font-weight:700;font-size:.83rem;color:#526179}
.model-paras{display:flex;flex-direction:column;gap:14px}
.para{background:#fff;border:1px solid #e5edf6;border-radius:20px;padding:18px;transition:.16s}
.para:hover{box-shadow:0 8px 24px rgba(15,23,42,.06)}
.para-label{display:inline-flex;border-radius:999px;background:#eef2ff;color:#3730a3;padding:4px 9px;font-size:.75rem;font-weight:800;margin-bottom:8px}

/* Đã chỉnh sửa: Căn đều và giảm độ đậm chữ */
.para-text{line-height:1.8;font-weight:400;font-size:1.1rem;text-align:justify;}
.para-text strong{font-weight:700;color:#0f172a}

.full-essay{background:#fff;border:1px solid #e5edf6;border-radius:24px;padding:26px;box-shadow:0 10px 24px rgba(15,23,42,.06)}
.full-essay h2{margin:0 0 6px;color:#102a5c;font-size:1.6rem;line-height:1.25;text-transform:uppercase}
.full-meta{color:#64748b;font-weight:600;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #e2e8f0}

/* Đã chỉnh sửa: Căn đều và giảm độ đậm chữ */
.full-essay p{margin:0 0 16px;line-height:1.8;font-weight:400;text-indent:1.65em;font-size:1.1rem;text-align:justify;}
.full-essay p:last-child{margin-bottom:0}

.keyword{background:#dcfce7;color:#166534;border-radius:6px;padding:2px 5px;font-weight:700;border:1px solid #bbf7d0}
.floating{position:fixed;left:50%;bottom:max(16px,env(safe-area-inset-bottom));transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.94);border:1px solid #dbe7f5;border-radius:999px;padding:8px 11px;box-shadow:0 18px 44px rgba(15,23,42,.16);backdrop-filter:blur(10px)}
.float-btn{border:0;background:#2563eb;color:#fff;width:38px;height:38px;border-radius:50%;font-weight:800;cursor:pointer}
@media(max-width:560px){
  .container{width:min(100% - 18px,1240px);padding-top:14px}
  .text-tabs{grid-template-columns:1fr}
  .hero{padding:20px 16px;border-radius:22px}
  .panel{border-radius:22px}
}
</style>
</head>
<body>

<div class="container">
  <section class="hero">
    <h1>BÀI VĂN MIÊU TẢ ĐỘNG VẬT</h1>
  </section>

  <section id="textTabs" class="text-tabs"></section>

  <section class="layout">
    <main class="main-stack">
      <section class="panel">
        <div class="panel-head">
          <span>👀 Trình bày văn bản</span>
          <div class="reader-actions">
            <button id="btnWhole" class="btn btn-primary" onclick="setModelMode('whole')">Xem full cả bài</button>
            <button id="btnPara" class="btn btn-light" onclick="setModelMode('full')">Xem theo đoạn</button>
            <button id="btnKw" class="btn btn-light" onclick="toggleKeywords()">Tô từ khóa</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="modelText" class="model-paras"></div>
        </div>
      </section>
    </main>
  </section>
</div>

<div class="floating">
  <button class="float-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</div>

<script>
const TEXTS = [
  {
    "id": "dog",
    "emoji": "🐶",
    "theme": "bac",
    "title": "Miêu tả con vật nuôi trong nhà – Chú chó Nâu",
    "author": "Sưu tầm", 
    "coreWords": [
      "thế giới động vật", "chú chó tên Nâu", "người bạn nhỏ", "gắn bó", 
      "khỏe mạnh", "màu nâu vàng óng", "mềm mượt như tơ", "chiếc yên xe đạp", 
      "vểnh lên", "đen láy", "tròn xoe", "thông minh", "lanh lợi", "ươn ướt", "đánh hơi",
      "trắng nhọn", "ve vẩy", "khôn ngoan", "trung thành", "bật dậy sủa vang", "vui vẻ",
      "tình cảm", "an ủi", "ấm áp", "người bạn thân thiết", "kỷ niệm đẹp"
    ],
    "paras": [
      "Trong thế giới động vật, mỗi loài đều có những nét đáng yêu và thú vị riêng. Đối với em, con vật mà em yêu quý nhất chính là chú chó tên Nâu của gia đình em. Chú không chỉ là vật nuôi thân thuộc mà còn là người bạn nhỏ luôn gắn bó với em mỗi ngày.",
      "Nâu đã sống cùng gia đình em hơn hai năm. Chú có thân hình khỏe mạnh cùng với bộ lông màu nâu vàng óng, mềm mượt như tơ nên cả nhà đã đặt cho chú cái tên là Nâu. Cái đầu của Nâu tựa như 1 chiếc yên xe đạp nhưng hơi tròn hơn, nổi bật với đôi tai lúc nào cũng vểnh lên như đang lắng nghe mọi âm thanh xung quanh. Đôi mắt chú đen láy, tròn xoe, ánh lên vẻ thông minh và lanh lợi. Chiếc mũi nhỏ màu đen luôn ươn ướt và đánh hơi rất giỏi. Hàm răng trắng nhọn giúp chú gặm xương vô cùng điêu luyện. Cái đuôi dài lúc nào cũng ve vẩy vui vẻ mỗi khi em đi học về. Tuy đôi mắt có lúc lim dim ngủ nhưng chỉ cần nghe tiếng động lạ là Nâu lập tức bật dậy sủa vang như báo cho cả nhà biết. Nhưng khi gặp người quen, chú lại vui vẻ chạy ra, vẫy đuôi mừng rỡ. Mỗi buổi chiều, em thường chơi ném bóng với Nâu. Chú chạy rất nhanh, ngậm quả bóng mang về cho em rồi ngước mắt nhìn như muốn được khen. Điều em yêu quý nhất ở Nâu chính là sự trung thành và tình cảm của chú dành cho gia đình. Dù ai trong nhà buồn hay vui, chú cũng luôn ngồi ở bên cạnh. Có lần em bị điểm kém nên rất buồn. Nâu như cảm nhận được đã bước đến và nhẹ nhàng dụi đầu vào chân em rồi nằm cạnh như muốn an ủi. Hành động nhỏ ấy khiến em cảm thấy lòng mình ấm áp hơn rất nhiều.",
      "Đối với em, Nâu không chỉ là một con vật nuôi mà còn là người bạn thân thiết luôn mang đến niềm vui và sự yêu thương. Em đã có rất nhiều kỷ niệm đẹp cùng chú chó đáng yêu này. Em sẽ chăm sóc cho Nâu thật khỏe mạnh để chơi đùa cùng nhau mỗi ngày."
    ]
  },
  {
    "id": "elephant",
    "emoji": "🐘",
    "theme": "earth",
    "title": "Miêu tả con vật hoang dã (ở sở thú) – Chú voi",
    "author": "Sưu tầm",
    "coreWords": [
      "tham quan sở thú", "to lớn", "thân thiện", "xám đậm", "nhăn nheo", "đồ sộ", 
      "chậm rãi", "chắc chắn", "cột đình", "chiếc vòi", "linh hoạt", "cuốn thức ăn", 
      "chiếc quạt lớn", "hiền và dịu dàng", "ngà trắng", "mạnh mẽ", "oai vệ", 
      "phun lên người", "thông minh", "người chăm sóc", "hiền lành", "tình cảm", 
      "gắn bó", "bảo vệ voi", "bình yên", "đáng yêu"
    ],
    "paras": [
      "Trong thế giới động vật, mỗi loài đều có những nét đáng yêu và thú vị riêng. Vào kỳ nghỉ hè năm trước, em đã có dịp được tham quan sở thú có rất nhiều loài vật nhưng khiến em ấn tượng nhất chính là chú voi to lớn và thân thiện.",
      "Chú voi ở sở thú có thân hình vô cùng to lớn với làn da của chú màu xám đậm, dày và nhăn như những lớp đất khô. Bốn chân voi to như bốn cái cột đình nên những bước đi của chú rất chậm rãi và vững vàng. Đặc biệt nhất là chiếc vòi dài có thể cuốn thức ăn, hút nước và còn dùng để nghịch đùa rất khéo léo. Hai chiếc tai to bè như hai chiếc quạt lớn. Đôi mắt voi nhỏ trông rất hiền và dịu dàng. Hai chiếc ngà trắng cong cong nhô ra hai bên làm chú trông thật mạnh mẽ và oai vệ. Ở sở thú, chú voi được rất nhiều người yêu thích và đứng xem. Chú thường dùng vòi cuốn từng bó cỏ rồi từ từ đưa vào miệng ăn trông rất ngon. Có lúc, chú còn dùng vòi hút nước rồi phun lên người để tắm mát khiến mọi người thích thú. Khi có khách tham quan cho chuối hoặc mía, chú voi nhẹ nhàng dùng vòi nhận lấy. Em thấy chú rất thông minh vì chú biết làm theo sự hướng dẫn của người chăm sóc. Dù thân hình to lớn nhưng chú không hề đáng sợ mà ngược lại còn rất hiền lành và thân thiện. Em được nghe nói voi là loài động vật thông minh, sống tình cảm và rất gắn bó với đồng loại. Em mong rằng mọi người sẽ luôn bảo vệ voi và không săn bắt chúng để những chú voi đáng yêu ấy có thể được sống bình yên. Chuyến đi sở thú hôm đó đã giúp em hiểu thêm nhiều điều thú vị về loài voi.",
      "Chú voi ở sở thú đã để lại trong em rất nhiều ấn tượng đẹp cả về thân hình to lớn cũng như tính cách và sự thông minh. Em hy vọng sẽ có dịp quay lại sở thú để được gặp chú voi thêm nhiều lần nữa. Đối với em, voi là một loài động vật đáng yêu, thông minh và vô cùng đặc biệt."
    ]
  }
];

let state = { text: "dog", modelMode: "whole", keywords: false };

function esc(s){return String(s||"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}

function currentText(){return TEXTS.find(t=>t.id===state.text)}

function highlightTerms(html){
  if(!state.keywords) return html;
  const t = currentText();
  const terms = [...t.coreWords].sort((a,b)=>b.length-a.length);
  let out = html;
  terms.forEach(term=>{
    const safe=esc(term).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    out=out.replace(new RegExp(safe,"gi"),m=>`<span class="keyword">${m}</span>`);
  });
  return out;
}

function renderTabs(){
  document.getElementById("textTabs").innerHTML=TEXTS.map(t=>`
    <button class="text-tab ${t.theme} ${t.id===state.text?'active':''}" onclick="selectText('${t.id}')">
      <div class="emoji">${t.emoji}</div><div><div class="tab-title">${t.title}</div><div class="tab-sub">${t.author}</div></div>
    </button>`).join("");
}

function updateButtons(){
  document.getElementById("btnWhole").className = state.modelMode==="whole" ? "btn btn-primary" : "btn btn-light";
  document.getElementById("btnPara").className = state.modelMode==="full" ? "btn btn-primary" : "btn btn-light";
  document.getElementById("btnKw").className = state.keywords ? "btn btn-active" : "btn btn-light";
}

function renderModel(){
  const t=currentText();
  if(state.modelMode==="whole"){
    document.getElementById("modelText").innerHTML=`<article class="full-essay">
      <h2>${esc(t.title)}</h2>
      <div class="full-meta">Tác giả: ${esc(t.author)}</div>
      ${t.paras.map(p=>`<p>${highlightTerms(p)}</p>`).join("")}
    </article>`;
  } else {
    document.getElementById("modelText").innerHTML=t.paras.map((p,idx)=>{
      return `<div class="para">
        <div class="para-label">Đoạn ${idx+1}</div>
        <div class="para-text">${highlightTerms(p)}</div>
      </div>`;
    }).join("");
  }
  updateButtons();
}

function setModelMode(m){
  state.modelMode=m; 
  renderModel();
}

function toggleKeywords(){
  state.keywords=!state.keywords; 
  renderModel();
}

function selectText(id){
  state.text=id; 
  renderTabs(); 
  renderModel();
}

// Init
renderTabs();
renderModel();

</script>
</body>
</html>
